<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Gym Progress Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #07090f;
  --bg2: #0d111c;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --pink: #f472b6;
  --violet: #818cf8;
  --green: #34d399;
  --orange: #fb923c;
  --yellow: #fbbf24;
  --text: #e2e8f0;
  --muted: rgba(255,255,255,0.38);
  --radius: 18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;justify-content:center;}
#app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden;}

/* ── NOISE OVERLAY ── */
#app::before{content:'';position:fixed;inset:0;width:430px;max-width:100%;pointer-events:none;opacity:.025;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
background-size:200px;z-index:0;}

/* ── HEADER ── */
.header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;background:linear-gradient(135deg,var(--pink),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.02em;}
.bw-badge{background:rgba(255,255,255,0.06);border:1px solid var(--border);padding:5px 14px;border-radius:30px;font-size:13px;cursor:pointer;transition:background .2s;}
.bw-badge:hover{background:rgba(255,255,255,0.1);}

/* ── SECTIONS ── */
.section{padding:18px 20px 0;position:relative;z-index:1;}
.greeting{font-family:'Syne',sans-serif;font-size:23px;font-weight:800;line-height:1.2;margin-bottom:3px;}
.sub{font-size:13px;color:var(--muted);}

/* ── STAT CARDS ROW ── */
.cards-row{display:flex;gap:10px;padding:14px 20px 0;}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 12px;transition:transform .15s;}
.stat-card:active{transform:scale(.97);}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.stat-val{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;line-height:1;}
.stat-unit{font-size:11px;color:var(--muted);font-family:'DM Sans';font-weight:400;}

/* ── BIG TODAY CARD ── */
.big-card{margin:14px 20px 0;background:linear-gradient(135deg,rgba(244,114,182,.11),rgba(129,140,248,.11));border:1px solid rgba(244,114,182,.22);border-radius:22px;padding:18px 18px 16px;}
.big-card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.day-tag{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--pink);text-transform:uppercase;margin-bottom:4px;}
.day-name{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;line-height:1.1;}
.day-icon{font-size:38px;line-height:1;}
.prog-row{display:flex;align-items:center;gap:10px;margin-top:14px;}
.prog-bg{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--violet));border-radius:10px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.pct-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--pink);min-width:34px;text-align:right;}
.start-btn{width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,var(--pink),var(--violet));border:none;border-radius:13px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .2s,transform .15s;box-shadow:0 4px 24px rgba(244,114,182,.3);}
.start-btn:active{opacity:.85;transform:scale(.98);}

/* ── WEEK CARD ── */
.week-card{margin:14px 20px 0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px 14px;}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;margin-bottom:12px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.06em;}
.week-dots{display:flex;gap:6px;justify-content:space-between;}
.week-dot{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
.dot-circle{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid rgba(255,255,255,.1);transition:all .2s;}
.dot-label{font-size:9px;color:var(--muted);font-weight:600;}

/* ── RINGS ROW ── */
.rings-row{display:flex;justify-content:space-around;align-items:center;padding:14px 20px 0;}
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.ring-wrap svg{display:block;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;}
.ring-lbl{font-size:10px;color:var(--muted);margin-top:5px;text-align:center;}

/* ── DAY SELECTOR ── */
.day-selector{display:flex;gap:8px;padding:16px 20px 0;overflow-x:auto;scrollbar-width:none;}
.day-selector::-webkit-scrollbar{display:none;}
.day-pill{flex-shrink:0;padding:7px 14px;border-radius:30px;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:var(--card);color:var(--muted);transition:all .2s;white-space:nowrap;}
.day-pill.active{background:rgba(244,114,182,.14);border-color:rgba(244,114,182,.4);color:var(--pink);}

/* ── EXERCISE CARDS ── */
.ex-list{padding:0 20px;}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
.ex-card.done{background:rgba(244,114,182,.07);border-color:rgba(244,114,182,.28);}
.ex-card:active{transform:scale(.98);}
.ex-check{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;font-size:13px;}
.ex-check.done{background:var(--pink);border-color:var(--pink);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;transition:opacity .2s;}
.ex-name.done{text-decoration:line-through;opacity:.4;}
.ex-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.ex-muscle{font-size:10px;color:rgba(244,114,182,.75);margin-top:2px;}
.weight-input{margin-left:auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:5px 8px;color:#fff;font-size:12px;width:58px;text-align:center;font-family:'DM Sans';}
.weight-input::placeholder{color:rgba(255,255,255,.25);}

/* ── REST CARD ── */
.rest-card{margin:14px 20px 0;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.22);border-radius:22px;padding:20px;}
.rest-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--green);margin-bottom:14px;}
.rest-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;}
.rest-item:last-child{border-bottom:none;}
.rest-emoji{font-size:20px;width:28px;text-align:center;}

/* ── COMPLETE BANNER ── */
.complete-banner{margin:14px 20px;background:rgba(52,211,153,.09);border:1px solid rgba(52,211,153,.28);border-radius:18px;padding:18px;text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.complete-banner .icon{font-size:36px;}
.complete-banner h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--green);margin-top:8px;}
.complete-banner p{font-size:12px;color:var(--muted);margin-top:4px;}

/* ── CALENDAR ── */
.streak-cards{display:flex;gap:10px;padding:14px 20px 0;}
.streak-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 10px;text-align:center;}
.streak-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;}
.streak-lbl{font-size:10px;color:var(--muted);margin-top:4px;}
.cal-wrap{padding:14px 20px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-hdr{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;font-weight:700;}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;background:rgba(255,255,255,.03);border:1px solid transparent;cursor:pointer;transition:all .15s;font-family:'DM Sans';}
.cal-day.today{border-color:var(--pink);color:var(--pink);font-weight:800;background:rgba(244,114,182,.1);}
.cal-day.trained{background:rgba(244,114,182,.15);border-color:rgba(244,114,182,.35);color:var(--pink);}
.cal-day.missed{background:rgba(239,68,68,.07);color:rgba(239,68,68,.6);}
.cal-day.rest-day{opacity:.35;}

/* ── NUTRITION ── */
.nutr-card{margin:12px 20px 0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;}
.nutr-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;}
.nutr-row:last-child{border-bottom:none;}
.nutr-name{font-size:14px;}
.nutr-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.nutr-track{display:flex;align-items:center;gap:9px;}
.nutr-btn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;line-height:1;}
.nutr-btn:active{background:rgba(255,255,255,.15);}
.nutr-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;min-width:30px;text-align:center;}
.meal-check{width:24px;height:24px;border-radius:7px;border:2px solid rgba(255,255,255,.2);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;flex-shrink:0;}
.meal-check.done{background:var(--green);border-color:var(--green);}

/* ── BOTTOM NAV ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:430px;max-width:100%;background:rgba(7,9,15,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding:10px 0 max(16px,env(safe-area-inset-bottom));z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:9px;font-family:'DM Sans';cursor:pointer;padding:4px;transition:color .2s;letter-spacing:.02em;font-weight:500;}
.nav-btn.active{color:var(--pink);}
.nav-icon{font-size:20px;line-height:1;}

/* ── CONFETTI ── */
.confetti-piece{position:fixed;top:-12px;pointer-events:none;z-index:9999;border-radius:2px;animation:confFall 2.8s ease-in forwards;}
@keyframes confFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(105vh) rotate(900deg);opacity:0;}}

/* ── ANIMATIONS ── */
@keyframes popIn{0%{transform:scale(.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes fadeUp{0%{transform:translateY(12px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
.fade-up{animation:fadeUp .35s ease forwards;}

/* ── PADDING BOTTOM (nav) ── */
.pb-nav{padding-bottom:90px;}
</style>
</head>
<body>
<div id="app">
  <div id="root" class="pb-nav"></div>
  <nav class="nav" id="nav"></nav>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const ROUTINE = {
  1:{name:"Glúteos + Femoral",tag:"LUN",color:"#f472b6",icon:"🍑",exercises:[
    {id:"e1",name:"Hip Thrust",sets:4,reps:"10-12",rest:"90s",muscle:"Glúteo mayor"},
    {id:"e2",name:"Peso Muerto Rumano",sets:3,reps:"10-12",rest:"90s",muscle:"Isquios, glúteos"},
    {id:"e3",name:"Curl Femoral",sets:3,reps:"12-15",rest:"60s",muscle:"Isquiotibiales"},
    {id:"e4",name:"Patada de Glúteo",sets:3,reps:"15/lado",rest:"60s",muscle:"Glúteo mayor"},
    {id:"e5",name:"Abducción en Máquina",sets:3,reps:"15-20",rest:"60s",muscle:"Glúteo medio"},
    {id:"e6",name:"Extensión de Cuádriceps",sets:3,reps:"12-15",rest:"60s",muscle:"Cuádriceps"},
  ]},
  2:{name:"Tren Superior",tag:"MAR",color:"#818cf8",icon:"💪",exercises:[
    {id:"e7",name:"Jalón al Pecho",sets:4,reps:"10-12",rest:"90s",muscle:"Dorsal, bíceps"},
    {id:"e8",name:"Remo Sentado",sets:3,reps:"10-12",rest:"90s",muscle:"Dorsal, trapecio"},
    {id:"e9",name:"Press de Pecho Máquina",sets:3,reps:"10-12",rest:"90s",muscle:"Pectoral, tríceps"},
    {id:"e10",name:"Press de Hombro",sets:3,reps:"10-12",rest:"90s",muscle:"Deltoides"},
    {id:"e11",name:"Curl de Bíceps",sets:3,reps:"12-15",rest:"60s",muscle:"Bíceps"},
    {id:"e12",name:"Extensión de Tríceps",sets:3,reps:"12-15",rest:"60s",muscle:"Tríceps"},
  ]},
  3:{name:"Descanso Activo",tag:"MIÉ",color:"#34d399",icon:"🧘",rest:true,
    activities:["🚶‍♀️ Caminar 30-45 min","🌿 Movilidad articular","🧘 Estiramientos suaves","🛁 Foam rolling","💧 Hidratación extra"]},
  4:{name:"Pierna Completa",tag:"JUE",color:"#fb923c",icon:"🦵",exercises:[
    {id:"e13",name:"Prensa de Pierna",sets:4,reps:"10-12",rest:"90s",muscle:"Cuádriceps, glúteos"},
    {id:"e14",name:"Sentadilla Hack",sets:3,reps:"10-12",rest:"90s",muscle:"Cuádriceps"},
    {id:"e15",name:"Hip Thrust",sets:3,reps:"12-15",rest:"90s",muscle:"Glúteo mayor"},
    {id:"e16",name:"Peso Muerto Rumano",sets:3,reps:"10-12",rest:"90s",muscle:"Isquiotibiales"},
    {id:"e17",name:"Sentadilla Búlgara",sets:3,reps:"10/lado",rest:"90s",muscle:"Cuádriceps, glúteos"},
    {id:"e18",name:"Gemelos en Máquina",sets:4,reps:"15-20",rest:"60s",muscle:"Gemelos"},
  ]},
  5:{name:"Descanso",tag:"VIE",color:"#64748b",icon:"😴",rest:true,
    activities:["😴 Descanso completo","🌙 Sueño 7-9 horas","🥗 Nutrición óptima","🧠 Recuperación mental","💆 Autocuidado"]},
  6:{name:"Glúteos Especialización",tag:"SÁB",color:"#f472b6",icon:"🔥",exercises:[
    {id:"e19",name:"Hip Thrust Pesado",sets:5,reps:"8-10",rest:"120s",muscle:"Glúteo mayor"},
    {id:"e20",name:"Sentadilla Búlgara",sets:4,reps:"10/lado",rest:"90s",muscle:"Glúteos, cuádriceps"},
    {id:"e21",name:"Abducción con Cable",sets:3,reps:"15-20",rest:"60s",muscle:"Glúteo medio"},
    {id:"e22",name:"Step Up",sets:3,reps:"12/lado",rest:"60s",muscle:"Glúteos, cuádriceps"},
    {id:"e23",name:"Patada de Glúteo Cable",sets:3,reps:"15/lado",rest:"60s",muscle:"Glúteo mayor"},
    {id:"e24",name:"Puente de Glúteo",sets:3,reps:"20",rest:"45s",muscle:"Glúteos"},
  ]},
  7:{name:"Descanso",tag:"DOM",color:"#64748b",icon:"🌟",rest:true,
    activities:["🌟 Descanso total","🎯 Planifica tu semana","🍳 Meal prep","🛁 Baño de sales","📖 Mentalidad positiva"]},
};

// ═══════════════════════════════════════════════
// STATE (persisted in localStorage)
// ═══════════════════════════════════════════════
const KEY = 'gpp_v2';
function loadState(){
  try{ return JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ return {}; }
}
function saveState(s){ try{ localStorage.setItem(KEY,JSON.stringify(s)); }catch(e){} }

const now = new Date();
const todayStr = now.toISOString().split('T')[0];
const todayDow = now.getDay()===0?7:now.getDay();

let state = Object.assign({
  tab:'dashboard',
  activeDay: todayDow,
  completed:{},      // "YYYY-MM-DD|exId" -> true
  weights:{},        // exId -> "kg"
  trainedDays:{},    // "YYYY-MM-DD|day" -> true
  bodyWeight:'57',
  streak:12,
  water:5,
  protein:3,
  meals:[false,false,false,false],
}, loadState());

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function exKey(id){ return `${todayStr}|${id}`; }
function dayDoneKey(d){ return `${todayStr}|${d}`; }

function getDayProgress(d){
  const day = ROUTINE[d];
  if(!day||day.rest) return {done:0,total:0,pct:100};
  const total = day.exercises.length;
  const done = day.exercises.filter(e=>state.completed[exKey(e.id)]).length;
  return {done,total,pct:total?Math.round(done/total*100):0};
}

// ═══════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════
function launchConfetti(){
  const colors=['#f472b6','#818cf8','#34d399','#fb923c','#fbbf24','#fff'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    const size=(6+Math.random()*9)+'px';
    el.style.cssText=`left:${Math.random()*100}%;width:${size};height:${size};background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.8}s;animation-duration:${2.2+Math.random()*1.2}s;border-radius:${Math.random()>0.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

// ═══════════════════════════════════════════════
// SVG RING
// ═══════════════════════════════════════════════
function ringHTML(pct,color,size=76,stroke=6){
  const r=(size-stroke)/2;
  const circ=2*Math.PI*r;
  const off=circ-(pct/100)*circ;
  return `<svg width="${size}" height="${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .8s ease"/>
  </svg>`;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
  const root=document.getElementById('root');
  const {tab,activeDay}=state;
  const todayProg=getDayProgress(todayDow);
  const activeProg=getDayProgress(activeDay);
  const trainedCount=Object.keys(state.trainedDays).filter(k=>k.startsWith(todayStr)).length;

  // ── DASHBOARD ──────────────────────────────
  if(tab==='dashboard'){
    const day=ROUTINE[todayDow];
    root.innerHTML=`
    <div class="header">
      <span class="logo">GYM PRO ✦</span>
      <div class="bw-badge" id="bwBadge">⚖️ ${state.bodyWeight} kg</div>
    </div>
    <div class="section fade-up">
      <div class="greeting">Hola, Campeona 🔥</div>
      <div class="sub">${now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>
    <div class="cards-row">
      <div class="stat-card"><div class="stat-label">Racha</div><div class="stat-val" style="color:var(--orange)">🔥${state.streak}<span class="stat-unit"> días</span></div></div>
      <div class="stat-card"><div class="stat-label">Esta semana</div><div class="stat-val" style="color:var(--violet)">${trainedCount}<span class="stat-unit">/4</span></div></div>
      <div class="stat-card"><div class="stat-label">Hoy</div><div class="stat-val" style="color:var(--green)">${todayProg.pct}<span class="stat-unit">%</span></div></div>
    </div>
    <div class="big-card">
      <div class="big-card-top">
        <div>
          <div class="day-tag">Hoy · ${day.tag}</div>
          <div class="day-name">${day.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">${day.rest?'Recuperación':day.exercises.length+' ejercicios'}</div>
        </div>
        <div class="day-icon">${day.icon}</div>
      </div>
      <div class="prog-row">
        <div class="prog-bg"><div class="prog-fill" style="width:${todayProg.pct}%"></div></div>
        <span class="pct-text">${todayProg.pct}%</span>
      </div>
      <button class="start-btn" id="goWorkout">
        ${todayProg.pct===0?'▶ Comenzar Entreno':todayProg.pct===100?'✓ Completado ⭐':'↗ Continuar Entreno'}
      </button>
    </div>
    <div class="week-card">
      <div class="card-title">Semana Actual</div>
      <div class="week-dots">
        ${[1,2,3,4,5,6,7].map(d=>{
          const done=!!state.trainedDays[dayDoneKey(d)];
          const isToday=d===todayDow;
          const c=ROUTINE[d].color;
          return `<div class="week-dot" data-day="${d}">
            <div class="dot-circle" style="background:${done?c:isToday?c+'22':'transparent'};border-color:${isToday?c:done?c:'rgba(255,255,255,.1)'};box-shadow:${isToday?`0 0 14px ${c}55`:done?`0 0 8px ${c}44`:'none'};font-size:${done?'14px':'16px'}">
              ${done?'✓':ROUTINE[d].icon}
            </div>
            <span class="dot-label">${ROUTINE[d].tag}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="rings-row">
      ${[
        {label:'Entreno',pct:todayProg.pct,color:'var(--pink)'},
        {label:'Proteína',pct:Math.round(state.protein/5*100),color:'var(--violet)'},
        {label:'Agua',pct:Math.round(state.water/8*100),color:'var(--green)'},
      ].map(r=>`<div style="text-align:center">
        <div class="ring-wrap">
          ${ringHTML(r.pct,r.color)}
          <div class="ring-center"><span class="ring-pct" style="color:${r.color}">${r.pct}%</span></div>
        </div>
        <div class="ring-lbl">${r.label}</div>
      </div>`).join('')}
    </div>
    <div style="height:10px"></div>
    `;
    document.getElementById('goWorkout').onclick=()=>{ state.activeDay=todayDow; state.tab='workout'; saveState(state); render(); };
    document.getElementById('bwBadge').onclick=()=>{
      const w=prompt('Peso corporal (kg):',state.bodyWeight);
      if(w&&!isNaN(parseFloat(w))){ state.bodyWeight=parseFloat(w).toFixed(1); saveState(state); render(); }
    };
    document.querySelectorAll('.week-dot').forEach(el=>el.addEventListener('click',()=>{
      state.activeDay=parseInt(el.dataset.day); state.tab='workout'; saveState(state); render();
    }));
  }

  // ── WORKOUT ────────────────────────────────
  else if(tab==='workout'){
    const day=ROUTINE[activeDay];
    const prog=activeProg;
    root.innerHTML=`
    <div class="header">
      <span class="logo">GYM PRO ✦</span>
      <div class="bw-badge">${day.icon} ${day.name}</div>
    </div>
    <div class="day-selector">
      ${[1,2,3,4,5,6,7].map(d=>`
        <div class="day-pill${activeDay===d?' active':''}" data-day="${d}">${ROUTINE[d].icon} ${ROUTINE[d].tag}</div>
      `).join('')}
    </div>
    <div class="section" style="margin-bottom:12px">
      <div class="greeting">${day.icon} ${day.name}</div>
      <div class="sub">${day.rest?'Recuperación activa':`${prog.done}/${prog.total} · ${prog.pct}% completo`}</div>
    </div>
    ${!day.rest?`
    <div style="padding:0 20px 12px">
      <div class="prog-bg" style="height:4px"><div class="prog-fill" style="width:${prog.pct}%"></div></div>
    </div>
    <div class="ex-list">
      ${day.exercises.map(ex=>{
        const done=!!state.completed[exKey(ex.id)];
        return `<div class="ex-card${done?' done':''}" data-exid="${ex.id}">
          <div class="ex-check${done?' done':''}">
            ${done?'✓':''}
          </div>
          <div class="ex-info">
            <div class="ex-name${done?' done':''}">${ex.name}</div>
            <div class="ex-meta">${ex.sets} series · ${ex.reps} reps · ⏱ ${ex.rest}</div>
            <div class="ex-muscle">${ex.muscle}</div>
          </div>
          <input class="weight-input" data-exid="${ex.id}" value="${state.weights[ex.id]||''}" placeholder="kg" onclick="event.stopPropagation()"/>
        </div>`;
      }).join('')}
    </div>
    ${prog.pct===100?`<div class="complete-banner"><div class="icon">🏆</div><h3>¡Día Completado!</h3><p>Eres increíble. Sigue así 💪</p></div>`:''}
    `:`
    <div class="rest-card">
      <div class="rest-title">Recuperación Activa</div>
      ${day.activities.map(a=>`<div class="rest-item"><span class="rest-emoji">${a.split(' ')[0]}</span><span>${a.split(' ').slice(1).join(' ')}</span></div>`).join('')}
    </div>
    `}
    <div style="height:10px"></div>
    `;

    document.querySelectorAll('.day-pill').forEach(el=>el.addEventListener('click',()=>{
      state.activeDay=parseInt(el.dataset.day); saveState(state); render();
    }));
    document.querySelectorAll('.ex-card').forEach(el=>el.addEventListener('click',()=>{
      const id=el.dataset.exid;
      const k=exKey(id);
      state.completed[k]=!state.completed[k];
      // check if day complete
      const d=ROUTINE[activeDay];
      if(d&&!d.rest){
        const allDone=d.exercises.every(e=>state.completed[exKey(e.id)]);
        if(allDone&&!state.trainedDays[dayDoneKey(activeDay)]){
          state.trainedDays[dayDoneKey(activeDay)]=true;
          state.streak++;
          saveState(state);
          launchConfetti();
        }
      }
      saveState(state); render();
    }));
    document.querySelectorAll('.weight-input').forEach(inp=>inp.addEventListener('change',()=>{
      state.weights[inp.dataset.exid]=inp.value; saveState(state);
    }));
  }

  // ── CALENDAR ──────────────────────────────
  else if(tab==='calendar'){
    const mStart=new Date(now.getFullYear(),now.getMonth(),1);
    const mDays=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const startDow=mStart.getDay()===0?6:mStart.getDay()-1;
    const hdrs=['L','M','X','J','V','S','D'];
    // Seed some random history
    const fakeTrained=new Set();
    for(let i=1;i<now.getDate();i++){
      const dow=new Date(now.getFullYear(),now.getMonth(),i).getDay();
      const isTrain=dow===1||dow===2||dow===4||dow===6;
      if(isTrain&&Math.random()>0.2) fakeTrained.add(i);
    }
    const trainedCount2=Object.keys(state.trainedDays).filter(k=>k.startsWith(todayStr)).length;

    root.innerHTML=`
    <div class="header">
      <span class="logo">GYM PRO ✦</span>
      <div class="bw-badge">📅 ${now.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</div>
    </div>
    <div class="section fade-up">
      <div class="greeting">Historial</div>
      <div class="sub">Tu progreso de entrenamientos</div>
    </div>
    <div class="streak-cards">
      <div class="streak-card"><div class="streak-num" style="color:var(--orange)">🔥${state.streak}</div><div class="streak-lbl">Racha actual</div></div>
      <div class="streak-card"><div class="streak-num" style="color:var(--yellow)">🏆18</div><div class="streak-lbl">Mejor racha</div></div>
      <div class="streak-card"><div class="streak-num" style="color:var(--violet)">💪47</div><div class="streak-lbl">Total días</div></div>
    </div>
    <div class="cal-wrap">
      <div class="cal-grid">
        ${hdrs.map(h=>`<div class="cal-hdr">${h}</div>`).join('')}
        ${Array.from({length:startDow},(_,i)=>`<div></div>`).join('')}
        ${Array.from({length:mDays},(_,i)=>{
          const d=i+1;
          const isToday=d===now.getDate();
          const isPast=d<now.getDate();
          const trained=fakeTrained.has(d)||state.trainedDays[`${todayStr}|${d}`];
          const missed=isPast&&!trained&&!isToday;
          let cls='cal-day';
          if(isToday) cls+=' today';
          else if(trained) cls+=' trained';
          else if(missed) cls+=' missed';
          return `<div class="${cls}">${isToday?'🔥':trained?'✓':d}</div>`;
        }).join('')}
      </div>
    </div>
    <div class="week-card" style="margin-top:14px">
      <div class="card-title">Leyenda</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:4px">
        <span style="font-size:12px;color:var(--muted)"><span style="color:var(--pink)">✓</span> Entrenado</span>
        <span style="font-size:12px;color:var(--muted)"><span style="color:rgba(239,68,68,.7)">●</span> Perdido</span>
        <span style="font-size:12px;color:var(--muted)">🔥 Hoy</span>
      </div>
    </div>
    <div style="height:10px"></div>
    `;
  }

  // ── NUTRITION ──────────────────────────────
  else if(tab==='nutrition'){
    root.innerHTML=`
    <div class="header">
      <span class="logo">GYM PRO ✦</span>
      <div class="bw-badge">🥗 Nutrición</div>
    </div>
    <div class="section fade-up">
      <div class="greeting">Nutrición Diaria</div>
      <div class="sub">Objetivos para ganar músculo</div>
    </div>
    <div class="nutr-card">
      <div class="card-title">Macros del Día</div>
      ${[
        {key:'water',label:'💧 Agua',sub:`${state.water}/8 vasos`,val:state.water,max:8,color:'var(--green)'},
        {key:'protein',label:'🥩 Proteína',sub:`${state.protein}/5 porciones`,val:state.protein,max:5,color:'var(--pink)'},
      ].map(m=>`
        <div class="nutr-row">
          <div><div class="nutr-name">${m.label}</div><div class="nutr-sub">${m.sub}</div></div>
          <div class="nutr-track">
            <button class="nutr-btn" data-key="${m.key}" data-delta="-1">−</button>
            <span class="nutr-val" style="color:${m.color}">${m.val}</span>
            <button class="nutr-btn" data-key="${m.key}" data-delta="1">+</button>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="nutr-card">
      <div class="card-title">Checklist de Comidas</div>
      ${['🌅 Desayuno · 7:00am','🍱 Almuerzo · 1:00pm','🍎 Merienda · 4:00pm','🌙 Cena · 8:00pm'].map((meal,i)=>`
        <div class="nutr-row" data-meal="${i}">
          <span style="font-size:13px;opacity:${state.meals[i]?0.4:1};text-decoration:${state.meals[i]?'line-through':'none'}">${meal}</span>
          <div class="meal-check${state.meals[i]?' done':''}">${state.meals[i]?'✓':''}</div>
        </div>
      `).join('')}
    </div>
    <div class="nutr-card">
      <div class="card-title">Tips para Ganar Músculo</div>
      ${['1.6–2g proteína/kg de peso corporal','Superávit calórico +200–300 kcal/día','Carbohidratos antes del entreno','Proteína + carbos en 30min post-entreno','Dormir 7–9h para recuperación muscular'].map(t=>`
        <div style="padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;color:rgba(255,255,255,.6);display:flex;gap:8px;align-items:flex-start">
          <span style="color:var(--violet);flex-shrink:0">◈</span>${t}
        </div>
      `).join('')}
    </div>
    <div style="height:10px"></div>
    `;

    document.querySelectorAll('[data-key]').forEach(btn=>{
      if(!btn.dataset.delta) return;
      btn.onclick=()=>{
        const k=btn.dataset.key; const d=parseInt(btn.dataset.delta);
        const max={water:8,protein:5}[k];
        state[k]=Math.min(max,Math.max(0,state[k]+d));
        saveState(state); render();
      };
    });
    document.querySelectorAll('[data-meal]').forEach(row=>{
      row.onclick=()=>{
        const i=parseInt(row.dataset.meal);
        state.meals[i]=!state.meals[i];
        saveState(state); render();
      };
    });
  }

  // ── NAV ────────────────────────────────────
  const navTabs=[
    {id:'dashboard',icon:'◉',label:'Inicio'},
    {id:'workout',icon:'⚡',label:'Entreno'},
    {id:'calendar',icon:'📅',label:'Calendario'},
    {id:'nutrition',icon:'🥗',label:'Nutrición'},
  ];
  document.getElementById('nav').innerHTML=navTabs.map(t=>`
    <button class="nav-btn${state.tab===t.id?' active':''}" data-tab="${t.id}">
      <span class="nav-icon">${t.icon}</span>${t.label}
    </button>
  `).join('');
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{
    state.tab=btn.dataset.tab; saveState(state); render();
  }));
}

render();
</script>
</body>
</html>
